#Colorscheme: base16-gruvbox-dark-medium
Colorscheme: base16-onedark.yml
#Colorscheme: base16-apprentice.ini
#Colorscheme: base16-woodland
#Colorscheme: base16-materia-vivid
#Colorscheme: base16-material
#Colorscheme: base16-gruvbox-material-dark-medium

GithubToken: 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
  #DryRun: true
DryRun: false

applications:
  alacritty:
    enabled: true
    files:
      default:
        path: ~/.config/alacritty/alacritty.yml
        mode: replace
        start_marker: "# <<<<<<<<<<"
        end_marker: "# >>>>>>>>>>"

  gtk2:
    enabled: true
    files:
      schemes:
        path: ~/.gtkrc-2.0.mine
        mode: replace
        start_marker: "# <<<<<<<<<<"
        end_marker: "# >>>>>>>>>>"

  nvim:
    enabled: true
    files:
      default:
        path: ~/.config/nvim/colors/base16.lua
        mode: replace
        start_marker: '-- <<<<<<<<<<'
        end_marker: '-- >>>>>>>>>>'

  i3status:
    enabled: true
    files:
      default:
        path: ~/.config/i3status/config
        mode: replace
        start_marker: "# <<<<<<<<<<"
        end_marker: "# >>>>>>>>>>"

  i3:
    enabled: true
    hook: i3-msg restart
    files:
      bar-colors:
        path: ~/.config/i3/i3-bar
        mode: replace
        start_marker: "# <<<<<<<<<<bar-colors"
        end_marker: "# >>>>>>>>>>bar-colors"
      client-properties:
        path: ~/.config/i3/config
        mode: replace
        start_marker: "# <<<<<<<<<<client-properties"
        end_marker: "# >>>>>>>>>>client-properties"
      colors:
        path: ~/.config/i3/config
        mode: replace
        start_marker: "# <<<<<<<<<<colors"
        end_marker: "# >>>>>>>>>>colors"

  rofi:
    enabled: true
    files:
      default:
        path: ~/.config/rofi/config.rasi
        mode: replace
        start_marker: "// <<<<<<<<<<"
        end_marker: "// >>>>>>>>>>"
